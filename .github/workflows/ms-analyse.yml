name: MS Analyse - CI/CD

on:
  push:
    branches: [ main, develop ]
    paths:
      - "ms-analyse/**"
      - ".github/workflows/ms-analyse.yml"
  pull_request:
    branches: [ main ]
    paths:
      - "ms-analyse/**"
      - ".github/workflows/ms-analyse.yml"

jobs:
  install:
    runs-on: ubuntu-latest
    env:
      PYTHON_VERSION: "3.12"
    defaults:
      run:
        working-directory: ms-analyse

    steps:
      - name: Checkout monorepo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Set up Python
        uses: actions/setup-python@8d9ed9ac5c53483de85588cdf95a591a75ab9f55
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: ms-analyse/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

  test:
    runs-on: ubuntu-latest
    needs: install
    env:
      PYTHON_VERSION: "3.12"
      PYTHONPATH: ${{ github.workspace }}/ms-analyse
      DATABASE_URL: sqlite:///./test_ms_analyse.db
    defaults:
      run:
        working-directory: ms-analyse

    steps:
      - name: Checkout monorepo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Set up Python
        uses: actions/setup-python@8d9ed9ac5c53483de85588cdf95a591a75ab9f55
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: ms-analyse/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run test suite
        run: python -m pytest -q

  quality:
    runs-on: ubuntu-latest
    needs: test
    env:
      PYTHON_VERSION: "3.12"
      PYTHONPATH: ${{ github.workspace }}/ms-analyse
      DATABASE_URL: sqlite:///./test_ms_analyse.db
    defaults:
      run:
        working-directory: ms-analyse

    steps:
      - name: Checkout monorepo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Set up Python
        uses: actions/setup-python@8d9ed9ac5c53483de85588cdf95a591a75ab9f55
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: ms-analyse/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run coverage gate
        run: |
          python -m pytest --cov=src --cov-report=term-missing --cov-report=xml:coverage.xml --cov-fail-under=80 -q

      - name: Upload coverage report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: ms-analyse-coverage
          path: ms-analyse/coverage.xml

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@2f77a1ec69fb1d595b06f35ab27e97605bdef703
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ startsWith(secrets.SONAR_HOST_URL, 'http') && secrets.SONAR_HOST_URL || 'https://sonarcloud.io' }}
        with:
          projectBaseDir: ms-analyse

  build:
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - name: Checkout monorepo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Build Docker image
        run: docker build -t ms-analyse:ci ./ms-analyse

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout monorepo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Deploy placeholder
        run: |
          echo "Deployment step ready for ms-analyse."
          echo "Branch a real deployment command here (SSH, registry push, Kubernetes, etc.)."
