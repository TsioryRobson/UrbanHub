name: MS6 - Validateur de donnees capteur

on:
  push:
    branches: [main, develop, "feature/ms6-validateur-ec03"]
    paths:
      - "ms6-validateur-capteur/**"
      - ".github/workflows/ms6-validateur.yml"
  pull_request:
    branches: [main]
    paths:
      - "ms6-validateur-capteur/**"
      - ".github/workflows/ms6-validateur.yml"
  workflow_dispatch:
    inputs:
      phase:
        description: "Phase EC03 (avant/apres) pour nommer le bundle d'artefacts"
        required: false
        default: "avant"
        type: choice
        options:
          - avant
          - apres

env:
  PYTHON_VERSION: "3.11"
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/urbanhub/ms6-validateur

jobs:
  # ---------------------------------------------------------
  # Etape 1 - test : pytest + coverage (gate 80%)
  # ---------------------------------------------------------
  test:
    name: 1. test (pytest + coverage 80%)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ms6-validateur-capteur
    steps:
      - name: Checkout monorepo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            ms6-validateur-capteur/requirements.txt
            ms6-validateur-capteur/requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run pytest + coverage (gate 80%)
        run: |
          mkdir -p 03_rapport_tests
          pytest tests/ \
            --tb=short \
            --junitxml=03_rapport_tests/rapport_tests.xml \
            --cov=src \
            --cov-report=term \
            --cov-report=xml:03_rapport_tests/coverage.xml \
            --cov-fail-under=80 \
            2>&1 | tee 03_rapport_tests/rapport_tests.txt

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ms6-validateur-tests
          path: |
            ms6-validateur-capteur/03_rapport_tests/rapport_tests.txt
            ms6-validateur-capteur/03_rapport_tests/rapport_tests.xml
            ms6-validateur-capteur/03_rapport_tests/coverage.xml

  # ---------------------------------------------------------
  # Etape 2 - quality : SonarCloud + Snyk + flake8
  # ---------------------------------------------------------
  quality:
    name: 2. quality (SonarCloud + Snyk + flake8)
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: ms6-validateur-capteur
    steps:
      - name: Checkout monorepo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            ms6-validateur-capteur/requirements.txt
            ms6-validateur-capteur/requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Re-run pytest for coverage.xml (Sonar)
        run: |
          mkdir -p 03_rapport_tests
          pytest tests/ \
            --junitxml=03_rapport_tests/rapport_tests.xml \
            --cov=src \
            --cov-report=xml:03_rapport_tests/coverage.xml \
            --cov-fail-under=80 \
            2>&1 | tee 03_rapport_tests/rapport_tests.txt

      - name: Compute phase folder
        id: phase
        run: |
          PHASE="${{ github.event.inputs.phase || 'apres' }}"
          echo "phase=${PHASE}" >> "$GITHUB_OUTPUT"
          echo "dir=0${{ '4' }}_analyse_${PHASE}" >> "$GITHUB_OUTPUT"
          mkdir -p "04_analyse_${PHASE}" "05_analyse_${PHASE}"

      - name: Run flake8 (capture phase)
        run: |
          PHASE="${{ steps.phase.outputs.phase }}"
          if [ "${PHASE}" = "avant" ]; then
            DIR="04_analyse_avant"
          else
            DIR="05_analyse_apres"
          fi
          mkdir -p "${DIR}"
          flake8 src/ --max-line-length=88 \
            2>&1 | tee "${DIR}/flake8_${PHASE}.txt" || true

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          projectBaseDir: ms6-validateur-capteur
          args: >
            -Dsonar.projectKey=TsioryRobson_urbanhub-ms6-validateur
            -Dsonar.organization=tsioryrobson
            -Dsonar.sources=src
            -Dsonar.tests=tests
            -Dsonar.python.coverage.reportPaths=03_rapport_tests/coverage.xml
            -Dsonar.python.xunit.reportPath=03_rapport_tests/rapport_tests.xml

      - name: Run Snyk (JSON + texte, capture phase)
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          PHASE="${{ steps.phase.outputs.phase }}"
          if [ "${PHASE}" = "avant" ]; then
            DIR="04_analyse_avant"
          else
            DIR="05_analyse_apres"
          fi
          mkdir -p "${DIR}"
          if [ -z "${SNYK_TOKEN}" ]; then
            echo "SNYK_TOKEN absent, placeholder." | tee "${DIR}/snyk_${PHASE}.txt"
            echo '{"vulnerabilities":[],"note":"SNYK_TOKEN missing"}' > "${DIR}/snyk_${PHASE}.json"
          else
            npm install -g snyk
            snyk auth "${SNYK_TOKEN}"
            snyk test --file=requirements.txt --package-manager=pip \
              --json-file-output="${DIR}/snyk_${PHASE}.json" || true
            snyk test --file=requirements.txt --package-manager=pip \
              2>&1 | tee "${DIR}/snyk_${PHASE}.txt" || true
          fi

      - name: Upload quality bundle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ms6-validateur-quality-${{ github.event.inputs.phase || 'apres' }}-${{ github.run_number }}
          path: |
            ms6-validateur-capteur/03_rapport_tests/**
            ms6-validateur-capteur/04_analyse_avant/**
            ms6-validateur-capteur/05_analyse_apres/**

  # ---------------------------------------------------------
  # Etape 3 - build : docker build + push ghcr.io + docker run + curl /docs
  # ---------------------------------------------------------
  build:
    name: 3. build (docker + ghcr.io + curl /docs)
    runs-on: ubuntu-latest
    needs: quality
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout monorepo
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GHCR_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: tags
        run: |
          OWNER_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          IMAGE="ghcr.io/${OWNER_LC}/urbanhub/ms6-validateur"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"
          echo "sha_tag=${IMAGE}:${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          echo "latest_tag=${IMAGE}:latest" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./ms6-validateur-capteur
          file: ./ms6-validateur-capteur/Dockerfile
          push: ${{ github.event_name == 'push' || github.event_name == 'workflow_dispatch' }}
          load: ${{ github.event_name == 'pull_request' }}
          tags: |
            ${{ steps.tags.outputs.sha_tag }}
            ${{ steps.tags.outputs.latest_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test - docker run + curl /docs
        run: |
          IMAGE="${{ steps.tags.outputs.sha_tag }}"
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            IMAGE="ms6-validateur:smoke"
            docker build -t "${IMAGE}" ./ms6-validateur-capteur
          fi
          docker run -d --name ms6-smoke -p 8000:8000 "${IMAGE}"
          for i in $(seq 1 20); do
            if curl -fsS http://localhost:8000/docs >/dev/null; then
              echo "OK: /docs repond apres ${i} tentative(s)"
              docker rm -f ms6-smoke
              exit 0
            fi
            sleep 2
          done
          echo "KO: /docs n'a pas repondu en 40s"
          docker logs ms6-smoke
          docker rm -f ms6-smoke
          exit 1

  # ---------------------------------------------------------
  # Etape 4 - deploy-staging : docker compose up
  # ---------------------------------------------------------
  deploy-staging:
    name: 4. deploy-staging (compose + healthcheck)
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout monorepo
        uses: actions/checkout@v4

      - name: docker compose up ms6-validateur
        run: docker compose up -d --build ms6-validateur

      - name: Wait for /docs healthcheck
        run: |
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:8006/docs >/dev/null; then
              echo "Service healthy after ${i} attempt(s)"
              docker compose logs ms6-validateur | tail -30
              exit 0
            fi
            sleep 3
          done
          echo "Service did not become healthy in time."
          docker compose logs ms6-validateur
          exit 1

      - name: Tear down
        if: always()
        run: docker compose down -v
