name: MS6 Validateur Capteur - CI/CD

on:
  push:
    branches: [ main, develop ]
    paths:
      - "ms6-validateur-capteur/**"
      - "docker-compose.yml"
      - ".github/workflows/ms6-validateur.yml"
  pull_request:
    branches: [ main ]
    paths:
      - "ms6-validateur-capteur/**"
      - "docker-compose.yml"
      - ".github/workflows/ms6-validateur.yml"

permissions:
  contents: read
  packages: write
  security-events: write

env:
  PYTHON_VERSION: "3.11"
  SERVICE_DIR: ms6-validateur-capteur
  IMAGE_NAME: ghcr.io/tsioryrobson/urbanhub/ms6-validateur

jobs:
  quality-reports:
    name: Tests, coverage, SonarCloud and Snyk reports
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.SERVICE_DIR }}
    env:
      PYTHONPATH: ${{ github.workspace }}/ms6-validateur-capteur

    steps:
      - name: Checkout monorepo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            ms6-validateur-capteur/requirements.txt
            ms6-validateur-capteur/requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run tests with coverage gate
        run: |
          pytest tests \
            --junitxml=report_tests.xml \
            --cov=src \
            --cov-config=.coveragerc \
            --cov-branch \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=80

      - name: Upload coverage and test reports
        uses: actions/upload-artifact@v4
        with:
          name: ms6-validateur-coverage-report
          path: |
            ms6-validateur-capteur/coverage.xml
            ms6-validateur-capteur/report_tests.xml

      - name: SonarCloud scan
        uses: SonarSource/sonarqube-scan-action@v7
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
        with:
          projectBaseDir: ms6-validateur-capteur

      - name: Snyk dependency report
        uses: snyk/actions/python@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: test
          args: --file=ms6-validateur-capteur/requirements.txt --json-file-output=ms6-validateur-capteur/snyk-report.json

      - name: Upload Snyk report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ms6-validateur-snyk-report
          path: ms6-validateur-capteur/snyk-report.json
          if-no-files-found: warn

  build-and-push:
    name: Build image, verify port 8000 and push GHCR
    runs-on: ubuntu-latest
    needs: quality-reports
    if: github.event_name == 'push'

    steps:
      - name: Checkout monorepo
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        run: |
          docker build \
            -t ${{ env.IMAGE_NAME }}:${{ github.sha }} \
            -t ${{ env.IMAGE_NAME }}:latest \
            ./${{ env.SERVICE_DIR }}

      - name: Verify container responds on port 8000
        run: |
          docker run -d --name ms6-validateur-test -p 8000:8000 ${{ env.IMAGE_NAME }}:${{ github.sha }}
          for i in {1..20}; do
            if curl -fsS http://localhost:8000/health; then
              docker logs ms6-validateur-test
              docker rm -f ms6-validateur-test
              exit 0
            fi
            sleep 2
          done
          docker logs ms6-validateur-test
          docker rm -f ms6-validateur-test
          exit 1

      - name: Push Docker image to GHCR
        run: |
          docker push ${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ env.IMAGE_NAME }}:latest
